<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
    <h2>Login</h2>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
    
    <form method="POST">
        {{ form.hidden_tag() }}
        <p>Username: {{ form.username() }}</p>
        <p>Password: {{ form.password() }}</p>
        {{ form.submit() }}
    </form>
    <a href="{{ url_for('register') }}">Register</a>
</body>
</html>
